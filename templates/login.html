<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>כניסת מנהל - DA Prime</title>
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow-lg" style="width: 350px;">
        <h3 class="text-center mb-4">כניסת מנהל</h3>
        {% with messages = get_flashed_messages() %}{% if messages %}
            <div class="alert alert-danger small p-2 text-center">{{ messages[0] }}</div>
        {% endif %}{% endwith %}
        <form method="POST">
            <input type="email" name="email" class="form-control mb-3" placeholder="אימייל" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="סיסמה" required>
            <button type="submit" class="btn btn-primary w-100 fw-bold">התחבר למערכת</button>
        </form>
        <p class="text-center small mt-3 text-secondary">DA Prime Studios</p>
    </div>
</body>
</html>
