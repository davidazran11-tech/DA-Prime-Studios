<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>ניהול DA Prime Studios</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between mb-4 bg-white p-3 shadow-sm rounded">
            <h2>ניהול סטודיו - DA Prime</h2>
            <a href="/logout" class="btn btn-danger">התנתק</a>
        </div>

        <div class="row">
            <div class="col-md-7">
                <div class="card p-4 mb-4 shadow-sm border-0">
                    <h4 class="text-primary border-bottom pb-2">פרסום פלייבק חדש</h4>
                    <form action="/admin/upload" method="POST" enctype="multipart/form-data" class="mt-3">
                        <div class="row g-2 mb-2">
                            <div class="col-6"><input type="text" name="title" class="form-control" placeholder="שם השיר" required></div>
                            <div class="col-6"><input type="text" name="genre" class="form-control" placeholder="סגנון"></div>
                        </div>
                        <input type="text" name="price" class="form-control mb-2" placeholder="מחיר (ב-₪)">
                        <textarea name="desc" class="form-control mb-2" placeholder="תיאור קצר"></textarea>
                        <div class="mb-2"><label class="small">קובץ שמע:</label><input type="file" name="audio" class="form-control" required></div>
                        <div class="mb-3"><label class="small">תמונת עטיפה:</label><input type="file" name="image" class="form-control" required></div>
                        <button class="btn btn-primary w-100 fw-bold">העלה לאתר עם סימן מים</button>
                    </form>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card p-4 mb-4 shadow-sm border-0">
                    <h4 class="text-success border-bottom pb-2">הגדרות סימן מים וקשר</h4>
                    <form action="/admin/settings" method="POST" enctype="multipart/form-data" class="mt-3">
                        <input type="text" name="phone" class="form-control mb-2" value="{{settings.phone}}" placeholder="טלפון">
                        <input type="text" name="whatsapp" class="form-control mb-2" value="{{settings.whatsapp}}" placeholder="ווצאפ (קידומת 972...)">
                        <label class="small mt-2">קובץ סימן מים קולי (Watermark):</label>
                        <input type="file" name="wm_file" class="form-control mb-2">
                        <label class="small">עוצמת סימן מים (דציבלים):</label>
                        <input type="number" name="wm_vol" class="form-control mb-3" value="{{settings.watermark_volume}}">
                        <button class="btn btn-success w-100 fw-bold">שמור הגדרות</button>
                    </form>
                </div>

                <div class="card p-4 mb-4 shadow-sm border-0">
                    <h4 class="text-warning border-bottom pb-2">הוספת מנהל חדש</h4>
                    <form action="/admin/add_admin" method="POST" class="mt-3">
                        <input type="email" name="email" class="form-control mb-2" placeholder="אימייל חדש" required>
                        <input type="password" name="password" class="form-control mb-2" placeholder="סיסמה למנהל" required>
                        <button class="btn btn-warning w-100 fw-bold">הוסף מנהל למערכת</button>
                    </form>
                </div>

                <div class="card p-4 shadow-sm border-0">
                    <h4 class="text-info border-bottom pb-2">שינוי סיסמה אישית</h4>
                    <form action="/admin/change_password" method="POST" class="mt-3">
                        <input type="password" name="new_pass" class="form-control mb-2" placeholder="סיסמה חדשה" required>
                        <button class="btn btn-info w-100 fw-bold">עדכן סיסמה</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="card p-4 shadow-sm border-0 mt-4 text-center">
            <h4 class="text-danger border-bottom pb-2">ניהול ומחיקת פלייבקים</h4>
            <table class="table table-hover mt-3">
                <thead><tr><th>שם הפלייבק</th><th>סגנון</th><th>פעולה</th></tr></thead>
                <tbody>
                    {% for t in tracks %}
                    <tr>
                        <td>{{t.title}}</td><td>{{t.genre}}</td>
                        <td><a href="/admin/delete/{{t.id}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('בטוח שברצונך למחוק?')">מחק שיר</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
